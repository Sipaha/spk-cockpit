name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libsecret-1-dev

      - name: Build web
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build cockpit binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build -tags "webkit2_41 production" -trimpath \
            -ldflags "-s -w -X main.version=${REF_NAME}" \
            -o "dist/spk-cockpit-${{ matrix.target }}" ./cmd/cockpit

      - name: Compute checksum
        run: |
          cd dist
          sha256sum "spk-cockpit-${{ matrix.target }}" > "spk-cockpit-${{ matrix.target }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: spk-cockpit-${{ matrix.target }}
          path: dist/spk-cockpit-${{ matrix.target }}*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
