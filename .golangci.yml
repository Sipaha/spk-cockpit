version: "2"
run:
  timeout: 3m
linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - gosec
    - misspell
    - revive
    - staticcheck
    - unparam
    - unused
linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "disableStutteringCheck"
formatters:
  enable:
    - gofmt
    - goimports
